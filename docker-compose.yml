services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ielts
      POSTGRES_PASSWORD: ielts
      POSTGRES_DB: ielts
    volumes:
      - ielts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ielts"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: ./api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://ielts:ielts@db:5432/ielts
    ports:
      - "${API_PORT:-5050}:5050"
    depends_on:
      db:
        condition: service_healthy
  web:
    build: ./web
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_BASE: http://localhost:${API_PORT:-5050}
    depends_on:
      - api
volumes:
  ielts_pgdata:
